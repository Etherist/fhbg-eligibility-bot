name: Deploy Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v3

    - name: Build site with MkDocs (if used)
      # Uncomment if using MkDocs:
      # - name: Install MkDocs
      #   run: pip install mkdocs-material
      # - name: Build docs
      #   run: mkdocs build
      run: |
        echo "Docs deployment would build static site from docs/ folder"
        # Placeholder - implement with your chosen static site generator

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: './docs'  # or './site' if using MkDocs

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
