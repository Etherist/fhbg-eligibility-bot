version: "3.1"

stories:
- story: Happy path - NSW eligible user
  steps:
    - intent: greet
    - action: utter_greet
    - intent: inform_state
      entities:
        - state: "NSW"
    - action: eligibility_form
      active_loop: eligibility_form
    - intent: inform_income
      entities:
        - income: 80000
    - intent: inform_property_price
      entities:
        - property_price: 700000
    - intent: inform_first_home
      entities:
        - first_home: "yes"
    - intent: inform_citizenship
      entities:
        - citizenship_status: "citizen"
    - intent: inform_residency
      entities:
        - will_reside: "yes"
    - action: eligibility_form
    - active_loop: null
    - action: action_check_eligibility
    - action: action_generate_report
    - intent: goodbye
    - action: utter_goodbye

- story: User not eligible due to income
  steps:
    - intent: greet
    - action: utter_greet
    - intent: inform_state
      entities:
        - state: "NSW"
    - action: eligibility_form
      active_loop: eligibility_form
    - intent: inform_income
      entities:
        - income: 200000  # Above cap
    - intent: inform_property_price
      entities:
        - property_price: 800000
    - intent: inform_first_home
      entities:
        - first_home: "yes"
    - intent: inform_citizenship
      entities:
        - citizenship_status: "citizen"
    - intent: inform_residency
      entities:
        - will_reside: "yes"
    - action: eligibility_form
    - active_loop: null
    - action: action_check_eligibility
    - action: action_generate_report
    - intent: goodbye
    - action: utter_goodbye

