- story: User not a first home buyer
  steps:
    - intent: greet
    - action: utter_greet
    - intent: inform_state
      entities:
        - state: "NSW"
    - action: eligibility_form
      active_loop: eligibility_form
    - intent: inform_income
      entities:
        - income: 80000
    - intent: inform_property_price
      entities:
        - property_price: 700000
