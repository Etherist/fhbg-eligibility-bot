- story: User requests restart after completion
  steps:
    - intent: greet
    - action: utter_greet
    - intent: inform_state
      entities:
        - state: "NSW"
    - action: eligibility_form
      active_loop: eligibility_form
    - intent: inform_income
      entities:
        - income: 90000
    - intent: inform_property_price
      entities:
        - property_price: 750000
    - intent: inform_first_home
      entities:
        - first_home: "yes"
    - intent: inform_citizenship
      entities:
        - citizenship_status: "citizen"
    - intent: inform_residency
      entities:
        - will_reside: "yes"
    - action: eligibility_form
    - active_loop: null
    - action: action_check_eligibility
    - action: action_generate_report
    - intent: restart
    - action: action_reset_slots
    - action: utter_restart
    - intent: inform_state
      entities:
        - state: "VIC"
    - action: eligibility_form
      active_loop: eligibility_form
    - intent: inform_income
      entities:
        - income: 70000
    - intent: inform_property_price
      entities:
        - property_price: 500000
    - intent: inform_first_home
      entities:
        - first_home: "yes"
    - intent: inform_citizenship
      entities:
        - citizenship_status: "pr"
    - intent: inform_residency
      entities:
        - will_reside: "yes"
    - action: eligibility_form
    - active_loop: null
    - action: action_check_eligibility
    - action: action_generate_report
