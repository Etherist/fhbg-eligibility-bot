version: "3.1"

rules:
- rule: Say goodbye whenever the user says goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Say hello whenever the user says hello
  steps:
    - intent: greet
    - action: utter_greet

- rule: Handle restart request
  steps:
    - intent: restart
    - action: action_reset_slots
    - action: utter_restart

- rule: Activate eligibility form
  condition:
    - slot_was_set:
        - state: null
  steps:
    - intent: inform_state
    - action: eligibility_form
    - active_loop: eligibility_form

- rule: Submit form and process eligibility
  condition:
    - active_loop: eligibility_form
  steps:
    - action: eligibility_form
    - active_loop: null
    - action: action_check_eligibility
    - action: action_generate_report
